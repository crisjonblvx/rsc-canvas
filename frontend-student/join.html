<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Join a Class — ReadySetClass Student</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1B3A52">
    <link rel="stylesheet" href="/assets/style.css">
    <script src="https://facultyflow-production.up.railway.app/api/v1/student/boot.js"></script>
    <style>
        .code-input {
            font-size: 1.8rem;
            text-align: center;
            letter-spacing: 4px;
            font-weight: 700;
            text-transform: uppercase;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .code-input::placeholder {
            letter-spacing: 2px;
            font-size: 1rem;
            font-weight: 400;
        }
        .success-card {
            background: #DCFCE7;
            border: 2px solid #16A34A;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            margin-top: 1.5rem;
            display: none;
        }
        .success-card.show { display: block; }
        .success-card h3 { color: #16A34A; margin-bottom: 0.5rem; }
        .course-info { color: #374151; font-size: 0.9rem; }
        .course-info strong { display: block; font-size: 1.1rem; color: #1B3A52; margin-bottom: 4px; }
    </style>
</head>
<body class="auth-page">
    <div class="auth-box">
        <div class="logo">
            <div style="font-size: 2rem;">🔑</div>
        </div>
        <h1>Join a Class</h1>
        <p class="tagline">Enter the class code your professor gave you</p>

        <div id="alert" class="alert"></div>

        <form id="join-form">
            <div class="form-group">
                <label for="code">Class Code</label>
                <input type="text" id="code" class="code-input" required
                       placeholder="RSC-XXXX" maxlength="8" autocomplete="off">
                <div class="hint">Format: RSC-XXXX (4 characters after RSC-)</div>
            </div>
            <button type="submit" class="btn btn-gold btn-full" id="join-btn">Join Class</button>
        </form>

        <div class="success-card" id="success-card">
            <h3>You're in!</h3>
            <div class="course-info" id="course-info"></div>
            <div style="margin-top: 1rem; display: flex; gap: 8px;">
                <button onclick="joinAnother()" class="btn btn-outline" style="flex:1;">Join Another</button>
                <a href="/dashboard" class="btn btn-primary" style="flex:1; text-decoration:none;">Go to Dashboard</a>
            </div>
        </div>

        <!-- QR Scanner -->
        <div style="text-align: center; margin-top: 1rem;">
            <button type="button" id="qr-btn" onclick="startQRScan()" class="btn btn-outline btn-sm" style="gap: 6px;">
                📷 Scan QR Code
            </button>
        </div>

        <div id="qr-scanner" style="display: none; margin-top: 1rem;">
            <div style="position: relative; border-radius: 12px; overflow: hidden; background: #000;">
                <video id="qr-video" style="width: 100%; display: block;" playsinline></video>
                <div style="position: absolute; inset: 0; border: 2px solid rgba(184,148,95,0.6); border-radius: 12px; pointer-events: none;"></div>
            </div>
            <button type="button" onclick="stopQRScan()" class="btn btn-outline btn-sm btn-full" style="margin-top: 8px;">Stop Scanning</button>
        </div>

        <div style="text-align: center; margin-top: 1.5rem;">
            <a href="/dashboard" style="color: #6B7280; font-size: 0.85rem; text-decoration: none;">Skip for now</a>
        </div>
    </div>

    <script src="/assets/app.js"></script>
    <script>
        if (!requireAuth()) { /* redirected */ }

        const codeInput = document.getElementById('code');
        let qrStream = null;

        // Auto-format: add RSC- prefix
        codeInput.addEventListener('input', () => {
            let val = codeInput.value.toUpperCase().replace(/[^A-Z0-9\-]/g, '');
            if (val.length > 0 && !val.startsWith('RSC-') && !val.startsWith('RSC')) {
                val = 'RSC-' + val;
            }
            codeInput.value = val;
        });

        document.getElementById('join-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert('alert');
            setLoading('join-btn', true, 'Joining...');

            try {
                const data = await api.post('/api/class-codes/join', {
                    code: codeInput.value
                });

                // Show success
                document.getElementById('join-form').style.display = 'none';
                const successCard = document.getElementById('success-card');
                const courseInfo = document.getElementById('course-info');
                const c = data.course;
                courseInfo.innerHTML = `
                    <strong>${escapeHtml(c.course_code || c.course_name)}</strong>
                    ${escapeHtml(c.course_name)}<br>
                    ${c.professor_name ? 'Prof. ' + escapeHtml(c.professor_name) : ''}
                    ${c.section ? ' &middot; Section ' + escapeHtml(c.section) : ''}
                `;
                successCard.classList.add('show');
            } catch (err) {
                showAlert('alert', err.message);
                setLoading('join-btn', false, 'Join Class');
            }
        });

        function joinAnother() {
            document.getElementById('join-form').style.display = 'block';
            document.getElementById('success-card').classList.remove('show');
            codeInput.value = '';
            codeInput.focus();
            setLoading('join-btn', false, 'Join Class');
        }

        // QR Code Scanning
        async function startQRScan() {
            const scannerDiv = document.getElementById('qr-scanner');
            const video = document.getElementById('qr-video');

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showAlert('alert', 'Camera access is not available on this device');
                return;
            }

            try {
                qrStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                video.srcObject = qrStream;
                video.play();
                scannerDiv.style.display = 'block';
                document.getElementById('qr-btn').style.display = 'none';
                scanQRFrame(video);
            } catch (err) {
                showAlert('alert', 'Could not access camera. Please enter the code manually.');
            }
        }

        function stopQRScan() {
            if (qrStream) {
                qrStream.getTracks().forEach(t => t.stop());
                qrStream = null;
            }
            document.getElementById('qr-scanner').style.display = 'none';
            document.getElementById('qr-btn').style.display = 'inline-flex';
        }

        function scanQRFrame(video) {
            if (!qrStream) return;

            if ('BarcodeDetector' in window) {
                const detector = new BarcodeDetector({ formats: ['qr_code'] });
                (function tick() {
                    if (!qrStream) return;
                    detector.detect(video).then(codes => {
                        for (const code of codes) {
                            const val = code.rawValue || '';
                            const match = val.match(/RSC-[A-Z0-9]{4}/i);
                            if (match) {
                                codeInput.value = match[0].toUpperCase();
                                stopQRScan();
                                document.getElementById('join-form').dispatchEvent(new Event('submit'));
                                return;
                            }
                        }
                        requestAnimationFrame(tick);
                    }).catch(() => requestAnimationFrame(tick));
                })();
            } else {
                // Fallback: BarcodeDetector not available
                stopQRScan();
                showAlert('alert', 'QR scanning requires Chrome 83+ or Safari 17+. Please enter the code manually.', 'warning');
            }
        }
    </script>
</body>
</html>
