<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Admin Dashboard - ReadySetClass™</title>
    <link rel="icon" href="/assets/ReadySetClass_alpha_badge.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-navy: #1E3A5F;
            --accent-gold: #C9A961;
            --background-cream: #F5F2E8;
            --text-dark: #2C3E50;
            --text-light: #666666;
            --white: #ffffff;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --font-display: 'Sora', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--background-cream);
            color: var(--text-dark);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--primary-navy);
        }

        h1 {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--primary-navy);
        }

        .header-actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-body);
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary-navy);
            color: white;
        }

        .btn-primary:hover {
            background: #152944;
        }

        .btn-secondary {
            background: var(--accent-gold);
            color: var(--primary-navy);
        }

        .btn-secondary:hover {
            background: #b89851;
        }

        .btn-danger {
            background: var(--error);
            color: white;
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-light);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-navy);
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e5e7eb;
        }

        .tab {
            padding: 1rem 2rem;
            background: none;
            border: none;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .tab.active {
            color: var(--primary-navy);
            border-bottom-color: var(--accent-gold);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .table-container {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 1rem;
            border-bottom: 2px solid #e5e7eb;
            font-weight: 600;
            color: var(--primary-navy);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid #e5e7eb;
        }

        tr:hover {
            background: #f9fafb;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-admin {
            background: var(--accent-gold);
            color: var(--primary-navy);
        }

        .badge-user {
            background: #e0e7ff;
            color: #3730a3;
        }

        .badge-demo {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-active {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-inactive {
            background: #fee2e2;
            color: #991b1b;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }

        .alert {
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .alert-info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #93c5fd;
        }

        select {
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-family: var(--font-body);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ Admin Dashboard</h1>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="window.location.href='/dashboard-v2.html'">← Back to App</button>
                <button class="btn btn-primary" onclick="window.location.href='/account.html'">Account</button>
            </div>
        </div>

        <div id="alertContainer"></div>

        <!-- Stats Overview -->
        <div class="stats-grid" id="statsGrid">
            <div class="loading">Loading statistics...</div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="showTab('users')">👥 Users</button>
            <button class="tab" onclick="showTab('analytics')">📊 Analytics</button>
            <button class="tab" onclick="showTab('system')">⚙️ System</button>
        </div>

        <!-- Users Tab -->
        <div id="users" class="tab-content active">
            <div class="table-container">
                <h2 style="margin-bottom: 1rem;">User Management</h2>
                <div id="usersTable">
                    <div class="loading">Loading users...</div>
                </div>
            </div>
        </div>

        <!-- Analytics Tab -->
        <div id="analytics" class="tab-content">
            <div class="table-container">
                <h2 style="margin-bottom: 1rem;">📊 Analytics & Insights</h2>
                <div id="analyticsData">
                    <div class="loading">Loading analytics...</div>
                </div>
            </div>
        </div>

        <!-- System Tab -->
        <div id="system" class="tab-content">
            <div class="table-container">
                <h2 style="margin-bottom: 1rem;">System Management</h2>
                <button class="btn btn-danger" onclick="cleanupDemos()">🗑️ Cleanup Expired Demos</button>
                <p style="color: var(--text-light); margin-top: 1rem; font-size: 0.875rem;">
                    This will permanently delete all expired demo accounts and their data.
                </p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://facultyflow-production.up.railway.app';
        let authToken = localStorage.getItem('auth_token');
        let currentUser = null;

        // Check auth and admin role
        async function checkAdminAccess() {
            if (!authToken) {
                window.location.href = '/login.html';
                return false;
            }

            try {
                const userStr = localStorage.getItem('user');
                if (userStr) {
                    currentUser = JSON.parse(userStr);
                    if (currentUser.role !== 'admin') {
                        showAlert('error', 'Admin access required');
                        setTimeout(() => window.location.href = '/dashboard-v2.html', 2000);
                        return false;
                    }
                }
                return true;
            } catch (e) {
                window.location.href = '/login.html';
                return false;
            }
        }

        // Show alert
        function showAlert(type, message) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            document.getElementById('alertContainer').appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 5000);
        }

        // Show tab
        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');

            // Load analytics when analytics tab is shown
            if (tabName === 'analytics') {
                loadAnalytics();
            }
        }

        // Load stats
        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/api/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();

                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-label">Total Users</div>
                        <div class="stat-value">${data.total_users}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Active (7 days)</div>
                        <div class="stat-value">${data.active_users_7d}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Demo Accounts</div>
                        <div class="stat-value">${data.demo_accounts}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Active Sessions</div>
                        <div class="stat-value">${data.active_sessions}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Canvas Connected</div>
                        <div class="stat-value">${data.canvas_connected}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Content Created</div>
                        <div class="stat-value">${data.content_created}</div>
                    </div>
                `;
            } catch (error) {
                showAlert('error', 'Failed to load stats');
            }
        }

        // Load users
        async function loadUsers() {
            try {
                const response = await fetch(`${API_URL}/api/admin/users`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();

                const tableHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Email</th>
                                <th>Name</th>
                                <th>Institution</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Created</th>
                                <th>Last Active</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.users.map(user => `
                                <tr>
                                    <td>${user.email}</td>
                                    <td>${user.full_name || '-'}</td>
                                    <td>${user.institution || '-'}</td>
                                    <td>
                                        <span class="badge badge-${user.role}">${user.role}</span>
                                        ${user.is_demo ? '<span class="badge badge-demo">DEMO</span>' : ''}
                                    </td>
                                    <td>
                                        <span class="badge ${user.is_active ? 'badge-active' : 'badge-inactive'}">
                                            ${user.is_active ? 'Active' : 'Disabled'}
                                        </span>
                                    </td>
                                    <td>${new Date(user.created_at).toLocaleDateString()}</td>
                                    <td>${user.last_active_at ? new Date(user.last_active_at).toLocaleDateString() : 'Never'}</td>
                                    <td>
                                        <select onchange="updateUserRole(${user.id}, this.value)">
                                            <option value="">Change Role</option>
                                            <option value="user">User</option>
                                            <option value="admin">Admin</option>
                                        </select>
                                        <button class="btn btn-small ${user.is_active ? 'btn-danger' : 'btn-primary'}"
                                                onclick="toggleUserStatus(${user.id}, ${!user.is_active})">
                                            ${user.is_active ? 'Disable' : 'Enable'}
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;

                document.getElementById('usersTable').innerHTML = tableHTML;
            } catch (error) {
                showAlert('error', 'Failed to load users');
            }
        }

        // Update user role
        async function updateUserRole(userId, newRole) {
            if (!newRole) return;

            try {
                const response = await fetch(`${API_URL}/api/admin/users/${userId}/role`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ role: newRole })
                });

                if (response.ok) {
                    showAlert('success', 'Role updated successfully');
                    loadUsers();
                } else {
                    showAlert('error', 'Failed to update role');
                }
            } catch (error) {
                showAlert('error', 'Failed to update role');
            }
        }

        // Toggle user status
        async function toggleUserStatus(userId, newStatus) {
            try {
                const response = await fetch(`${API_URL}/api/admin/users/${userId}/status`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ is_active: newStatus })
                });

                if (response.ok) {
                    showAlert('success', `User ${newStatus ? 'enabled' : 'disabled'} successfully`);
                    loadUsers();
                } else {
                    showAlert('error', 'Failed to update status');
                }
            } catch (error) {
                showAlert('error', 'Failed to update status');
            }
        }

        // Load analytics
        async function loadAnalytics() {
            try {
                const response = await fetch(`${API_URL}/api/admin/analytics`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();

                const avgMinutes = Math.floor(data.avg_session_duration_seconds / 60);
                const avgSeconds = data.avg_session_duration_seconds % 60;

                const analyticsHTML = `
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;">
                        <div style="background: var(--background-cream); padding: 1.5rem; border-radius: 8px;">
                            <h3 style="color: var(--primary-navy); margin-bottom: 0.5rem;">⏱️ Avg Session Duration</h3>
                            <div style="font-size: 2rem; font-weight: 700; color: var(--primary-navy);">
                                ${avgMinutes}m ${avgSeconds}s
                            </div>
                        </div>
                        <div style="background: var(--background-cream); padding: 1.5rem; border-radius: 8px;">
                            <h3 style="color: var(--primary-navy); margin-bottom: 0.5rem;">📍 Total Events Tracked</h3>
                            <div style="font-size: 2rem; font-weight: 700; color: var(--primary-navy);">
                                ${data.total_events.toLocaleString()}
                            </div>
                        </div>
                    </div>

                    <h3 style="margin-bottom: 1rem; color: var(--primary-navy);">🔥 Most Used Features (Last 30 Days)</h3>
                    ${data.top_features.length > 0 ? `
                        <table>
                            <thead>
                                <tr>
                                    <th>Feature</th>
                                    <th>Usage Count</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.top_features.map(f => `
                                    <tr>
                                        <td><strong>${f.feature}</strong></td>
                                        <td>${f.count}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    ` : '<p style="color: var(--text-light);">No feature usage data yet.</p>'}

                    <h3 style="margin: 2rem 0 1rem; color: var(--primary-navy);">📈 Daily Active Users (Last 30 Days)</h3>
                    ${data.daily_active_users.length > 0 ? `
                        <div style="max-height: 300px; overflow-y: auto;">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Active Users</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${data.daily_active_users.slice(0, 15).map(d => `
                                        <tr>
                                            <td>${new Date(d.date).toLocaleDateString()}</td>
                                            <td>${d.users}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    ` : '<p style="color: var(--text-light);">No user activity data yet.</p>'}
                `;

                document.getElementById('analyticsData').innerHTML = analyticsHTML;
            } catch (error) {
                document.getElementById('analyticsData').innerHTML = '<p style="color: var(--error);">Failed to load analytics data</p>';
            }
        }

        // Cleanup expired demos
        async function cleanupDemos() {
            if (!confirm('Are you sure you want to delete all expired demo accounts? This cannot be undone.')) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/demo/cleanup`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('success', data.message);
                    loadStats();
                    loadUsers();
                } else {
                    showAlert('error', data.detail || 'Failed to cleanup demos');
                }
            } catch (error) {
                showAlert('error', 'Failed to cleanup demos');
            }
        }

        // Initialize
        async function init() {
            const hasAccess = await checkAdminAccess();
            if (hasAccess) {
                loadStats();
                loadUsers();
            }
        }

        init();
    </script>
</body>
</html>
